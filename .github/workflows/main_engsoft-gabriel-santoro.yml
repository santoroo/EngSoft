# Links de documentação úteis sobre o deploy no Azure Web Apps
# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

# Nome do workflow que vai aparecer na aba Actions do GitHub
name: Build and deploy Python app to Azure Web App - engsoft-gabriel-santoro

# Define quando o workflow será executado
on:
  # Executa automaticamente quando houver push
  push:
    # Limita a execução para a branch main
    branches:
      - main
  # Permite executar manualmente pela aba Actions
  workflow_dispatch:

# Define os jobs do pipeline
jobs:
  # Job responsável por preparar o projeto
  build:
    # Define que esse job vai rodar em uma máquina Ubuntu mais recente
    runs-on: ubuntu-latest
    # Define permissões usadas nesse job
    permissions:
      # Permissão de leitura do conteúdo do repositório, necessária para o checkout
      contents: read #This is required for actions/checkout

    # Lista de passos executados no job build
    steps:
      # Faz o download do código do repositório para a máquina virtual do workflow
      - uses: actions/checkout@v4

      # Configura a versão do Python que será usada no pipeline
      - name: Set up Python version
        # Action oficial para configurar Python
        uses: actions/setup-python@v5
        # Parâmetros da action
        with:
          # Define a versão do Python
          python-version: '3.14'

      # Step pedido no exercício: imprime uma mensagem no console antes do build
      - name: Mensagem inicial
        # Comando executado no terminal
        run: echo "Iniciando o deploy do meu projeto!"

      # Comentário explicando a seção de build local
      # 🛠️ Local Build Section (Optional)
      # A seção abaixo cria um ambiente virtual e instala as dependências localmente
      # Isso ajuda a detectar erros de build antes do deploy
      # Se você quiser um pipeline mais rápido, essa parte pode ser removida
      - name: Create and Start virtual environment and Install dependencies
        # Executa múltiplos comandos no terminal
        run: |
          # Cria o ambiente virtual chamado antenv
          python -m venv antenv
          # Ativa o ambiente virtual no Linux
          source antenv/bin/activate
          # Instala as dependências listadas no requirements.txt
          pip install -r requirements.txt

      # Comentário explicando o motivo de excluir a pasta do ambiente virtual do artefato
      # By default, when you enable GitHub CI/CD integration through the Azure portal, the platform automatically sets the SCM_DO_BUILD_DURING_DEPLOYMENT application setting to true. This triggers the use of Oryx, a build engine that handles application compilation and dependency installation (e.g., pip install) directly on the platform during deployment. Hence, we exclude the antenv virtual environment directory from the deployment artifact to reduce the payload size.
      - name: Upload artifact for deployment jobs
        # Action que envia os arquivos gerados para serem usados no job de deploy
        uses: actions/upload-artifact@v4
        # Parâmetros da action
        with:
          # Nome do artefato que será salvo
          name: python-app
          # Caminhos incluídos e excluídos no artefato
          path: |
            .
            !antenv/

      # Comentário sobre a possibilidade de não usar o Oryx no deploy
      # 🚫 Opting Out of Oryx Build
      # Se você quiser desativar o build automático do Oryx durante o deploy:
      # 1. Remova a variável SCM_DO_BUILD_DURING_DEPLOYMENT das configurações do App Service
      # 2. Use outro modelo de workflow de deploy, conforme os exemplos da Microsoft
      # Referência: https://github.com/Azure/actions-workflow-samples/tree/master/AppService

  # Job responsável por fazer o deploy no Azure
  deploy:
    # Esse job também roda em Ubuntu
    runs-on: ubuntu-latest
    # Esse job só começa depois que o build terminar com sucesso
    needs: build
    # Permissões usadas no job deploy
    permissions:
      # Permissão para solicitar token JWT e autenticar no Azure
      id-token: write #This is required for requesting the JWT
      # Permissão de leitura do repositório
      contents: read #This is required for actions/checkout

    # Lista de passos executados no job deploy
    steps:
      # Baixa o artefato gerado no job build
      - name: Download artifact from build job
        # Action oficial para baixar artefatos
        uses: actions/download-artifact@v4
        # Parâmetros da action
        with:
          # Nome do artefato que será baixado
          name: python-app

      # Faz login no Azure usando os secrets configurados automaticamente
      - name: Login to Azure
        # Action oficial de login no Azure
        uses: azure/login@v2
        # Parâmetros da action
        with:
          # Client ID da aplicação registrada no Azure
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CA757C2DF47F467397B3F93C3E9868AF }}
          # Tenant ID da conta/organização do Azure
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1F3D99537C6540B180E249BE2E5BEEA8 }}
          # Subscription ID da assinatura do Azure
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_61F1F9F40BBC42B8ACD3100EDA3FAB26 }}

      # Faz o deploy da aplicação para o Azure Web App
      - name: 'Deploy to Azure Web App'
        # Action oficial de deploy para Azure Web Apps
        uses: azure/webapps-deploy@v3
        # ID interno do step, caso outro step precisasse usar sua saída
        id: deploy-to-webapp
        # Parâmetros da action
        with:
          # Nome do App Service criado na Azure
          app-name: 'engsoft-gabriel-santoro'
          # Slot de deploy usado, neste caso o slot padrão de produção
          slot-name: 'Production'
